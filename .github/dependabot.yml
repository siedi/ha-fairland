# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      # Dependabot should not update Home Assistant as that should match the homeassistant key in hacs.json
      - dependency-name: "homeassistant"
      # ruff is a dev-only linting tool; updates are not critical
      - dependency-name: "ruff"
      # pip is only a ">=" floor in requirements.txt; bumping the floor on
      # every pip patch release is pure noise (security updates still come
      # through regardless of this ignore)
      - dependency-name: "pip"
    groups:
      pip-dependencies:
        patterns:
          - "*"